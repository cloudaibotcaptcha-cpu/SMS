<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistics - SMS Dashboard</title>
    <link rel="stylesheet" href="../styles.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="nav-bar">
        <a href="/">Dashboard</a>
        <a href="/clock">Digital Clock</a>
        <a href="/statistics" class="active">Statistics</a>
    </nav>

    <div class="container">
        <h1>SMS Statistics</h1>

        <!-- SMS Delivery Rates -->
        <div class="statistics-panel">
            <h2>Delivery Rates</h2>
            <div class="stats-grid">
                <div class="stat-card stat-success">
                    <div class="stat-number" id="success-rate">0%</div>
                    <div class="stat-label">Successful</div>
                </div>
                <div class="stat-card stat-danger">
                    <div class="stat-number" id="fail-rate">0%</div>
                    <div class="stat-label">Failed</div>
                </div>
                <div class="stat-card stat-warning">
                    <div class="stat-number" id="pending-rate">0%</div>
                    <div class="stat-label">Pending</div>
                </div>
            </div>
        </div>

        <!-- OTP Statistics -->
        <div class="statistics-panel" style="margin-top:20px;">
            <h2>OTP Usage</h2>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number" id="otp-total">0</div>
                    <div class="stat-label">Total Requests</div>
                </div>
                <div class="stat-card stat-success">
                    <div class="stat-number" id="otp-verified">0</div>
                    <div class="stat-label">Verified</div>
                </div>
                <div class="stat-card stat-danger">
                    <div class="stat-number" id="otp-failed">0</div>
                    <div class="stat-label">Failed</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="otp-success-rate">0%</div>
                    <div class="stat-label">Success Rate</div>
                </div>
            </div>
        </div>

        <!-- Recent Activity -->
        <div class="sent-sms-list" style="margin-top:20px;">
            <h2>Recent SMS Activity</h2>
            <table>
                <thead>
                    <tr>
                        <th>Recipient</th>
                        <th>Status</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody id="recent-activity">
                    <tr>
                        <td colspan="3" style="text-align:center;color:#888;padding:20px;">Loading...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <footer style="text-align:center;padding:20px;color:#888;margin-top:30px;">
        <p>&copy; 2026 SMS Statistics Platform</p>
    </footer>

    <script>
        const API_BASE = window.location.origin + '/api';

        async function loadStatistics() {
            try {
                // Load SMS stats
                const smsRes = await fetch(`${API_BASE}/sms/stats`);
                const smsData = await smsRes.json();

                if (smsData.success) {
                    const s = smsData.data;
                    const total = s.total || 1;
                    document.getElementById('success-rate').textContent =
                        Math.round((s.sent / total) * 100) + '%';
                    document.getElementById('fail-rate').textContent =
                        Math.round((s.failed / total) * 100) + '%';
                    document.getElementById('pending-rate').textContent =
                        Math.round((s.pending / total) * 100) + '%';
                }

                // Load OTP stats
                const otpRes = await fetch(`${API_BASE}/otp/stats`);
                const otpData = await otpRes.json();

                if (otpData.success) {
                    const o = otpData.data;
                    document.getElementById('otp-total').textContent = o.total_requests;
                    document.getElementById('otp-verified').textContent = o.verified;
                    document.getElementById('otp-failed').textContent = o.failed;
                    document.getElementById('otp-success-rate').textContent = o.success_rate + '%';
                }

                // Load recent activity
                const histRes = await fetch(`${API_BASE}/sms/history?per_page=5`);
                const histData = await histRes.json();

                if (histData.success) {
                    const tbody = document.getElementById('recent-activity');
                    if (histData.data.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;color:#888;padding:20px;">No activity yet</td></tr>';
                    } else {
                        tbody.innerHTML = histData.data.map(sms => `
                            <tr>
                                <td>${sms.recipient}</td>
                                <td><span class="status-badge status-${sms.status}">${sms.status}</span></td>
                                <td>${new Date(sms.created_at).toLocaleString('th-TH')}</td>
                            </tr>
                        `).join('');
                    }
                }
            } catch (error) {
                console.error('Error loading statistics:', error);
            }
        }

        document.addEventListener('DOMContentLoaded', loadStatistics);
        setInterval(loadStatistics, 30000);
    </script>
</body>
</html>
